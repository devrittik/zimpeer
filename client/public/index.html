<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Primary Meta -->
    <title>Zimpeer | Free Secure Browser Video Meetings</title>
    <meta
      name="description"
      content="Create or join secure HD video meetings instantly with Zimpeer. Browser-based WebRTC meetings with screen sharing, chat, file sharing and no downloads required."
    />
    <meta
      name="keywords"
      content="video meetings, online meetings, browser video call, WebRTC app, zoom alternative, secure video calls, free meeting app"
    />
    <meta name="author" content="Zimpeer" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Canonical -->
    <link rel="canonical" href="https://zimpeer.vercel.app/" />

    <!-- Favicons -->
    <link rel="icon" href="%PUBLIC_URL%/assets/favicon/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="%PUBLIC_URL%/assets/favicon/favicon-96x96.png"
    />
    <link
      rel="apple-touch-icon"
      href="%PUBLIC_URL%/assets/favicon/apple-touch-icon.png"
    />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zimpeer" />
    <meta property="og:title" content="Zimpeer | Free Secure Video Meetings" />
    <meta
      property="og:description"
      content="Secure browser-based video meetings with chat, screen sharing and file sharing. No downloads required."
    />
    <meta property="og:url" content="https://zimpeer.vercel.app/" />
    <meta
      property="og:image"
      content="https://zimpeer.vercel.app/preview.png"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zimpeer | Free Secure Video Meetings" />
    <meta
      name="twitter:description"
      content="Create or join browser-based meetings instantly with Zimpeer."
    />
    <meta
      name="twitter:image"
      content="https://zimpeer.vercel.app/preview.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Zimpeer",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web Browser",
        "url": "https://zimpeer.vercel.app/",
        "description": "Browser-based real-time video meeting app with chat, screen sharing and file sharing.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run Zimpeer.</noscript>
    <div id="root"></div>
  </body>
</html>
